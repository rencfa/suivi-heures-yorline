<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi des Heures - Assistante</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        .dashboard { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; color: #7f8c8d; }
        .card .value { font-size: 24px; font-weight: bold; }
        .solde-positif { color: #27ae60; } 
        .solde-negatif { color: #c0392b; } 
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .input-group.large { flex: 2; min-width: 200px; }
        label { font-size: 14px; margin-bottom: 5px; color: #34495e; }
        input { padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .btn-export { background-color: #27ae60; margin-left: 10px; }
        .btn-export:hover { background-color: #2ecc71; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background-color: #2c3e50; color: white; }
        .delete-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; }
        .delete-btn:hover { background-color: #c0392b; }
        .actions-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>⏱️ Suivi des Heures</h1>

    <div class="dashboard">
        <div class="card">
            <h3>Total Théorique</h3>
            <div class="value" id="total-theo">0 h</div>
        </div>
        <div class="card">
            <h3>Total Réel</h3>
            <div class="value" id="total-reel">0 h</div>
        </div>
        <div class="card">
            <h3>Solde d'heures</h3>
            <div class="value" id="solde">0 h</div>
            <small id="solde-text"></small>
        </div>
    </div>

    <div class="form-container">
        <div class="input-group">
            <label for="date">Date</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label for="theo">Théorique (h)</label>
            <input type="number" id="theo" step="0.25" placeholder="Ex: 7.5">
        </div>
        <div class="input-group">
            <label for="reel">Réel (h)</label>
            <input type="number" id="reel" step="0.25" placeholder="Ex: 8">
        </div>
        <div class="input-group large">
            <label for="commentaire">Commentaire (Optionnel)</label>
            <input type="text" id="commentaire" placeholder="Ex: Réunion tardive, RDV médical...">
        </div>
        <button onclick="ajouterEntree()">Ajouter</button>
    </div>

    <div class="actions-header">
        <h2>Historique</h2>
        <button class="btn-export" onclick="exporterCSV()">💾 Exporter vers Excel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Théorique</th>
                <th>Réel</th>
                <th>Écart</th>
                <th>Commentaire</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        let entrees = JSON.parse(localStorage.getItem('heuresAssistante')) || [];

        function mettreAJourAffichage() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            let totalTheo = 0;
            let totalReel = 0;

            // Trier les entrées par date (de la plus récente à la plus ancienne)
            entrees.sort((a, b) => new Date(b.date) - new Date(a.date));

            entrees.forEach((entree, index) => {
                totalTheo += entree.theo;
                totalReel += entree.reel;
                let ecart = entree.reel - entree.theo;

                let row = `<tr>
                    <td>${entree.date}</td>
                    <td>${entree.theo} h</td>
                    <td>${entree.reel} h</td>
                    <td style="color: ${ecart >= 0 ? '#27ae60' : '#c0392b'}"><b>${ecart > 0 ? '+' : ''}${ecart} h</b></td>
                    <td><i>${entree.commentaire}</i></td>
                    <td><button class="delete-btn" onclick="supprimerEntree(${index})">Supprimer</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('total-theo').innerText = totalTheo + ' h';
            document.getElementById('total-reel').innerText = totalReel + ' h';
            
            let solde = totalReel - totalTheo;
            let soldeEl = document.getElementById('solde');
            let soldeTextEl = document.getElementById('solde-text');
            
            soldeEl.innerText = (solde > 0 ? '+' : '') + solde + ' h';
            
            if (solde > 0) {
                soldeEl.className = 'value solde-positif';
                soldeTextEl.innerText = "Vous lui devez des heures";
            } else if (solde < 0) {
                soldeEl.className = 'value solde-negatif';
                soldeTextEl.innerText = "Elle vous doit des heures";
            } else {
                soldeEl.className = 'value';
                soldeTextEl.innerText = "À jour";
            }

            localStorage.setItem('heuresAssistante', JSON.stringify(entrees));
        }

        function ajouterEntree() {
            let date = document.getElementById('date').value;
            let theo = parseFloat(document.getElementById('theo').value);
            let reel = parseFloat(document.getElementById('reel').value);
            let commentaire = document.getElementById('commentaire').value;

            if (!date || isNaN(theo) || isNaN(reel)) {
                alert("Veuillez remplir au moins la date et les heures.");
                return;
            }

            entrees.push({ date, theo, reel, commentaire });
            
            document.getElementById('date').value = '';
            document.getElementById('theo').value = '';
            document.getElementById('reel').value = '';
            document.getElementById('commentaire').value = '';

            mettreAJourAffichage();
        }

        function supprimerEntree(index) {
            if(confirm("Voulez-vous vraiment supprimer cette ligne ?")) {
                entrees.splice(index, 1);
                mettreAJourAffichage();
            }
        }

        function exporterCSV() {
            // Création de l'en-tête pour Excel (format compatible français avec point-virgule)
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // Le \uFEFF aide Excel à lire les accents
            csvContent += "Date;Heures Theoriques;Heures Reelles;Ecart;Commentaire\n";
            
            entrees.forEach(function(e) {
                let ecart = e.reel - e.theo;
                // On remplace les éventuels points-virgules dans les commentaires pour ne pas casser le fichier
                let comPropre = e.commentaire ? e.commentaire.replace(/;/g, ',') : "";
                let row = `${e.date};${e.theo};${e.reel};${ecart};"${comPropre}"`;
                csvContent += row + "\n";
            });

            // Création du lien de téléchargement
            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "suivi_heures.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        mettreAJourAffichage();
    </script>
</body>
</html>
